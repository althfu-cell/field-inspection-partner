<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#0c0c0c">
<title>현장점검 파트너 · 시흥시</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --ink:#020817; --ink-soft:#52606d;
    --line:#e2e8f0; --bg:#f3f3f3; --card:#ffffff; --mist:#f3f3f3;
    --obsidian:#0c0c0c; --iris:#8247ff; --magenta:#f47bff;
    --grad:linear-gradient(92deg,#8247ff,#f47bff);
    --red:#d93025; --red-bg:#fce8e6;
    --yellow:#f9ab00; --yellow-bg:#fef7e0;
    --green:#188038; --green-bg:#e6f4ea;
    --orange:#e8710a; --orange-bg:#feefe3;
    --rc:12px; --rb:6px; --ri:6px; --tap:48px;
    --shadow-card:rgba(0,0,0,.04) 0 2px 8px 0,rgba(0,0,0,.06) 0 8px 24px 0;
    --shadow-cta:rgba(255,255,255,.2) 0 -2px 1px 0 inset,rgba(255,255,255,.1) 0 4px 16px 0 inset,rgba(0,0,0,.1) 0 6px 16px 0;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;overflow-x:hidden}
  body{
    font-family:'Inter',"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",system-ui,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5;
    font-size:16px;letter-spacing:-0.16px;-webkit-text-size-adjust:100%;
  }
  .app{max-width:680px;margin:0 auto;min-height:100vh;background:var(--bg)}

  /* ── Header ── */
  header.top{
    background:var(--obsidian);color:#fff;
    padding:16px 20px 14px;position:sticky;top:0;z-index:50;
  }
  header.top h1{margin:0;font-size:1.05rem;font-weight:600;letter-spacing:-0.2px}
  header.top .sub{margin-top:2px;font-size:.76rem;opacity:.55;letter-spacing:-0.1px}

  main{padding:16px 16px 220px}

  /* ── Section cards ── */
  .section{
    background:var(--card);border-radius:var(--rc);
    box-shadow:var(--shadow-card);border:1px solid var(--line);
    padding:20px;margin-bottom:12px;
  }
  .section-header{margin-bottom:18px}
  .section-title{font-size:1.05rem;font-weight:600;color:var(--ink);letter-spacing:-0.2px;margin:0 0 4px}
  .section-sub{font-size:.8rem;color:var(--ink-soft);margin:0;letter-spacing:-0.1px}

  .field{margin-bottom:14px}
  .field:last-child{margin-bottom:0}
  label.lbl{display:block;font-size:.77rem;font-weight:500;color:var(--ink-soft);margin-bottom:5px;letter-spacing:-0.1px}
  input[type=text],input[type=date],input[type=number],select,textarea{
    width:100%;border:1px solid var(--line);border-radius:var(--ri);
    padding:11px 13px;font-size:.95rem;font-family:inherit;color:var(--ink);
    background:#fff;min-height:var(--tap);letter-spacing:-0.14px;
    transition:border-color .15s,box-shadow .15s;
  }
  input[type=date]{min-width:0;max-width:100%;-webkit-appearance:none;appearance:none}
  textarea{min-height:80px;resize:vertical}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--iris);box-shadow:0 0 0 3px rgba(130,71,255,.12)}

  /* ── Buttons ── */
  button{font-family:inherit;cursor:pointer;border:none;font-weight:500;letter-spacing:-0.12px}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:7px;
    min-height:var(--tap);padding:0 18px;border-radius:var(--rb);font-size:.95rem;
    background:var(--grad);color:#fff;width:100%;transition:filter .12s;
    box-shadow:var(--shadow-cta);font-weight:600;
  }
  .btn:active{filter:brightness(.9)}
  .btn.secondary{background:var(--obsidian);color:#fff;box-shadow:none}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:none;font-weight:500}
  .btn.ghost:hover{border-color:var(--ink-soft)}
  .btn.lg{font-size:1rem;font-weight:700;min-height:54px}
  .btn-row{display:flex;gap:8px}
  .btn-row>.btn{flex:1}

  /* ── Site rows ── */
  .site-row{border:1px solid var(--line);border-radius:var(--rc);padding:14px;margin-bottom:10px;background:#fff}
  .site-row .row-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .site-row .row-num{font-weight:600;color:var(--iris);font-size:.86rem;letter-spacing:-0.1px}
  .icon-del{
    background:#fff;color:var(--ink-soft);min-height:30px;border-radius:var(--rb);
    font-size:.82rem;padding:0 10px;border:1px solid var(--line);
    display:inline-flex;align-items:center;gap:4px;transition:all .12s;
  }
  .icon-del:hover{background:var(--red-bg);color:var(--red);border-color:var(--red)}
  .two-col{display:flex;gap:10px}
  .two-col>div{flex:1}

  /* ── Autocomplete ── */
  .addr-wrap{position:relative}
  .nominatim-dd{
    position:absolute;top:calc(100% + 4px);left:0;right:0;
    background:#fff;border:1px solid var(--iris);border-radius:var(--rc);
    box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:200;overflow:hidden;
  }
  .nominatim-dd button{
    display:block;width:100%;text-align:left;padding:10px 13px;
    font-size:.84rem;font-weight:400;color:var(--ink);background:#fff;
    border:none;border-bottom:1px solid var(--line);cursor:pointer;transition:background .1s;
  }
  .nominatim-dd button:last-child{border-bottom:none}
  .nominatim-dd button:hover{background:#f0ebff}
  .nominatim-dd .dd-name{font-weight:600;display:block}
  .nominatim-dd .dd-addr{font-size:.74rem;color:var(--ink-soft);display:block;margin-top:1px}
  .nominatim-dd .dd-empty{padding:10px 13px;font-size:.84rem;color:var(--ink-soft)}

  /* custom cl */
  .cl-item{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .cl-item input{flex:1}

/* ── Step 2 summary ── */
  .summary{background:var(--card);border-radius:var(--rc);box-shadow:var(--shadow-card);border:1px solid var(--line);padding:16px 18px;margin-bottom:12px}
  .summary .meta{display:flex;flex-wrap:wrap;gap:5px 16px;font-size:.8rem;color:var(--ink-soft);margin-bottom:12px}
  .summary .meta b{color:var(--ink);font-weight:600}
  .progress-top{display:flex;justify-content:space-between;font-size:.78rem;font-weight:600;color:var(--ink-soft);margin-bottom:5px}
  .progress-bar{height:6px;background:var(--line);border-radius:9999px;overflow:hidden}
  .progress-fill{height:100%;background:var(--grad);width:0;transition:width .35s}

  /* ── Inspection card ── */
  .insp-card{background:var(--card);border-radius:var(--rc);box-shadow:var(--shadow-card);border:2px solid var(--line);padding:18px}
  .insp-card.r-done{border-color:var(--green)}
  .insp-card.r-issue{border-color:var(--orange)}
  .insp-card.r-revisit{border-color:var(--red)}
  .ic-head{display:flex;align-items:center;gap:9px;margin-bottom:4px}
  .ic-seq{background:var(--grad);color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.86rem;flex-shrink:0}
  .ic-alias{font-size:1.08rem;font-weight:600;letter-spacing:-0.2px;flex:1;min-width:0}
  .ic-addr{color:var(--ink-soft);font-size:.86rem;margin:2px 0 12px}
  .ic-info{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .chip{background:var(--mist);border-radius:var(--rb);padding:6px 10px;font-size:.8rem;color:var(--ink-soft)}
  .chip b{color:var(--ink);font-weight:600}
  .prememo{background:#f0ebff;border-radius:var(--rb);padding:10px 12px;font-size:.84rem;color:var(--iris);margin-bottom:14px;border:1px solid rgba(130,71,255,.15)}
  .prememo::before{content:"📌 사전 메모  ";font-weight:700}

  .map-row{display:flex;gap:8px;margin-bottom:14px}
  .map-row .btn{font-size:.86rem;min-height:42px}
  .map-row .btn.kakao{background:#fee500;color:#3c1e1e;box-shadow:none}
  .map-row .btn.naver{background:#03c75a;color:#fff;box-shadow:none}

  .checklist{margin-bottom:14px}
  .checklist h3{font-size:.78rem;color:var(--ink-soft);margin:0 0 8px;font-weight:600}
  .check-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:var(--rb);margin-bottom:6px;min-height:44px;cursor:pointer;user-select:none;transition:all .12s}
  .check-item.checked{background:var(--green-bg);border-color:var(--green)}
  .check-item input{width:20px;height:20px;flex-shrink:0;accent-color:var(--green)}
  .check-item span{font-size:.9rem}
  .check-item.checked span{color:var(--green);font-weight:600}

  .result-row{display:flex;gap:8px;margin-top:6px}
  .result-row button{
    flex:1;min-height:52px;border-radius:var(--rb);font-size:.84rem;font-weight:600;
    border:1px solid var(--line);background:#fff;color:var(--ink-soft);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;line-height:1.2;transition:all .12s;
  }
  .result-row button .em{font-size:1.1rem}
  .result-row button.on[data-r=done]{background:var(--green);border-color:var(--green);color:#fff;transform:scale(1.05);box-shadow:0 6px 16px rgba(24,128,56,.4)}
  .result-row button.on[data-r=issue]{background:var(--orange);border-color:var(--orange);color:#fff;transform:scale(1.05);box-shadow:0 6px 16px rgba(232,113,10,.4)}
  .result-row button.on[data-r=revisit]{background:var(--red);border-color:var(--red);color:#fff;transform:scale(1.05);box-shadow:0 6px 16px rgba(217,48,37,.4)}

  /* ── Bottom nav ── */
  .nav-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);padding:10px 14px calc(10px + env(safe-area-inset-bottom));z-index:40}
  .nav-inner{max-width:680px;margin:0 auto;display:flex;flex-direction:column;gap:8px}
  .nav-move{display:flex;gap:10px}
  .nav-move .btn{flex:1}
  .nav-move .btn:disabled{opacity:.35;pointer-events:none}
  .nav-tools{display:flex;gap:8px}
  .nav-tools .btn{flex:1;font-size:.82rem;padding:0 8px}

  /* ── Toast ── */
  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);background:var(--obsidian);color:#fff;padding:11px 20px;border-radius:9999px;font-size:.86rem;font-weight:500;opacity:0;pointer-events:none;transition:.22s;z-index:1000;box-shadow:0 4px 16px rgba(0,0,0,.25);white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .hint{font-size:.74rem;color:var(--ink-soft);margin-top:5px;line-height:1.4}
  .hidden{display:none !important}

  select.unset{color:var(--iris);font-weight:600}

  /* ── Celebration overlay ── */
  .celeb-overlay{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);animation:celFadeIn .4s ease}
  .celeb-overlay.hidden{display:none}
  @keyframes celFadeIn{from{opacity:0}to{opacity:1}}
  #confetti-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
  .celeb-card{position:relative;z-index:1;background:#fff;border-radius:var(--rc);padding:40px 28px;text-align:center;max-width:300px;width:88%;animation:celPop .5s cubic-bezier(.34,1.56,.64,1)}
  @keyframes celPop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
  .celeb-emoji{font-size:3.6rem;margin-bottom:12px;display:block;animation:celBounce .8s ease infinite alternate}
  @keyframes celBounce{from{transform:translateY(0)}to{transform:translateY(-10px)}}
  .celeb-title{font-size:1.75rem;font-weight:800;color:var(--ink);letter-spacing:-0.5px;margin-bottom:8px}
  .celeb-sub{font-size:.95rem;font-weight:600;color:var(--iris);margin-bottom:6px;min-height:1.4em}
  .celeb-msg{font-size:.83rem;color:var(--ink-soft);margin-bottom:24px}
  .celeb-close{max-width:160px;margin:0 auto}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <h1>점검할 곳만 입력해주세요</h1>
    <div class="sub">카카오맵·네이버지도 연동부터 점검 목록까지, 현장에서 함께합니다</div>
  </header>

  <main>
    <!-- ───────── STEP 1 ───────── -->
    <div id="step1">

      <!-- 기본 정보 -->
      <div class="section">
        <div class="section-header">
          <p class="section-title">점검을 준비해요</p>
          <p class="section-sub">점검 유형과 일정을 알려주세요</p>
        </div>
        <div class="field">
          <label class="lbl" for="f-date">점검일</label>
          <input type="date" id="f-date">
        </div>
        <div class="field">
          <label class="lbl" for="f-type">점검 유형</label>
          <select id="f-type">
            <option value="" disabled>✦ 유형을 선택하면 항목이 자동으로 채워져요</option>
            <option value="불법광고물">불법광고물</option>
            <option value="공중화장실">공중화장실</option>
            <option value="공원시설">공원시설</option>
            <option value="도로시설">도로시설</option>
            <option value="직접입력">직접입력</option>
          </select>
        </div>
        <div class="field hidden" id="custom-cl-wrap">
          <label class="lbl">점검 항목 <span style="color:var(--iris);font-weight:600">(수정·삭제·추가 가능)</span></label>
          <div id="custom-cl-list"></div>
          <button class="btn ghost" type="button" id="add-cl-item" style="margin-top:6px">+ 항목 추가</button>
        </div>
      </div>

      <!-- 점검지 -->
      <div class="section">
        <div class="section-header">
          <p class="section-title">어디를 점검할까요?</p>
          <p class="section-sub">점검할 장소를 하나씩 추가해 보세요</p>
        </div>
        <div id="site-list"></div>
        <button class="btn ghost" type="button" id="add-site">+ 점검지 추가</button>
      </div>

      <button class="btn lg" type="button" id="generate">점검표 만들기 →</button>
    </div>

    <!-- ───────── STEP 2 ───────── -->
    <div id="step2" class="hidden">
      <div class="summary">
        <div class="meta">
          <span>🗓 <b id="s-date"></b></span>
          <span>🏷 <b id="s-type"></b></span>
          <span>📍 점검지 <b id="s-total"></b>곳</span>
        </div>
        <div class="progress-top">
          <span>진행률</span>
          <span><b id="s-done">0</b> / <b id="s-count">0</b> 완료</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="s-fill"></div></div>
      </div>

      <!-- 카드 뷰 -->
      <div id="card-mount"></div>

    </div>
  </main>
</div>

<!-- 하단 nav -->
<div class="nav-bar hidden" id="nav-bar">
  <div class="nav-inner">
    <div class="nav-move">
      <button class="btn secondary" id="prev-btn">◀ 이전</button>
      <button class="btn secondary" id="next-btn">다음 ▶</button>
    </div>
    <div class="nav-tools">
      <button class="btn secondary" id="share-btn">📤 공유</button>
      <button class="btn ghost" id="edit-btn">✏️ 점검지 수정</button>
    </div>
  </div>
</div>

<!-- 점검 완료 셀레브레이션 -->
<div class="celeb-overlay hidden" id="celeb-overlay">
  <canvas id="confetti-canvas"></canvas>
  <div class="celeb-card">
    <span class="celeb-emoji" id="celeb-emoji">🎉</span>
    <div class="celeb-title">점검 완료!</div>
    <div class="celeb-sub" id="celeb-sub"></div>
    <div class="celeb-msg">오늘도 수고하셨어요</div>
    <button class="btn ghost celeb-close" id="celeb-close">확인</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
(function(){
  const sb=supabase.createClient(
    'https://pctxvxblffnjnmprgwqv.supabase.co',
    'sb_publishable_qJVsR9RMnNUykMBJjjEyTw_PNCYLBLo'
  );

  /* ── 체크리스트 템플릿 ── */
  const checklistTemplates = {
    "불법광고물":["현수막 무단 설치 여부","전단지 무단 배포 여부","입간판 불법 설치 여부","벽보 부착 여부","기타 위반사항"],
    "공중화장실":["내부 청결 상태","휴지·비누 등 비품 구비","시설 파손 여부","조명 정상 작동 여부","악취 발생 여부"],
    "공원시설":["운동기구 파손 여부","안전 펜스 상태","조명 시설 상태","쓰레기 무단 투기 여부","벤치·테이블 파손 여부"],
    "도로시설":["맨홀 뚜껑 상태","가드레일 파손 여부","노면 표시 마모 상태","신호등·가로등 작동 여부","도로 파손·균열 여부"]
  };

  const $ = s => document.querySelector(s);
  const $$ = s => Array.from(document.querySelectorAll(s));
  const esc = s => String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

  const b64enc = obj => btoa(unescape(encodeURIComponent(JSON.stringify(obj)))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  const b64dec = str => { try{ const p=str.replace(/-/g,'+').replace(/_/g,'/'); return JSON.parse(decodeURIComponent(escape(atob(p+'=='.slice(0,(4-p.length%4)%4))))); }catch(e){ return null; } };
  const hashKey = obj => { const s=JSON.stringify(obj); let h=5381; for(let i=0;i<s.length;i++) h=((h<<5)+h+s.charCodeAt(i))>>>0; return "fic_"+h.toString(36); };

  let toastTimer;
  function toast(msg){
    const t=$("#toast"); t.textContent=msg; t.classList.add("show");
    clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2500);
  }
  async function copy(text){
    try{ await navigator.clipboard.writeText(text); return true; }
    catch(e){
      try{ const ta=document.createElement("textarea"); ta.value=text; ta.style.cssText="position:fixed;opacity:0"; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); return true; }
      catch(_){ return false; }
    }
  }

  /* ── Nominatim ── */
  let nominatimLastReq=0;
  async function nominatimSearch(query){
    const now=Date.now();
    if(now-nominatimLastReq<1000) await new Promise(r=>setTimeout(r,1000-(now-nominatimLastReq)));
    nominatimLastReq=Date.now();
    try{
      const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&countrycodes=kr&limit=5`,
        {headers:{"Accept-Language":"ko"}});
      return r.ok?await r.json():[];
    }catch(e){ return []; }
  }

  let ddTimers={};
  function setupAutocomplete(inputEl, ddEl, onSelect){
    inputEl.addEventListener("input",()=>{
      const id=inputEl.dataset.autocompleteId||inputEl.id;
      clearTimeout(ddTimers[id]);
      const q=inputEl.value.trim();
      if(q.length<2){ddEl.classList.add("hidden");return;}
      ddTimers[id]=setTimeout(async()=>{
        const results=await nominatimSearch(q);
        ddEl.innerHTML="";
        if(!results.length){
          ddEl.innerHTML='<div class="dd-empty">검색 결과가 없습니다</div>';
          ddEl.classList.remove("hidden"); return;
        }
        results.forEach(item=>{
          const name=item.name||item.display_name.split(",")[0];
          const btn=document.createElement("button");
          btn.type="button";
          btn.innerHTML=`<span class="dd-name">${esc(name)}</span><span class="dd-addr">${esc(item.display_name)}</span>`;
          btn.addEventListener("click",()=>{ onSelect({name,lat:+item.lat,lng:+item.lon}); ddEl.classList.add("hidden"); });
          ddEl.appendChild(btn);
        });
        ddEl.classList.remove("hidden");
      },500);
    });
    document.addEventListener("click",e=>{ if(!ddEl.contains(e.target)&&e.target!==inputEl) ddEl.classList.add("hidden"); });
  }

  /* ── STEP 1 상태 ── */
  let sites=[], customCl=[];
  function blankSite(){ return {addr:"",alias:"",memo:"",lat:null,lng:null}; }

  function renderSites(){
    const wrap=$("#site-list"); wrap.innerHTML="";
    sites.forEach((s,i)=>{
      const row=document.createElement("div"); row.className="site-row";
      row.innerHTML=`
        <div class="row-head">
          <span class="row-num">점검지 ${i+1}</span>
          <button class="icon-del" type="button" data-act="del" data-i="${i}">🗑 삭제</button>
        </div>
        <div class="field">
          <label class="lbl">주소</label>
          <div class="addr-wrap">
            <input type="text" data-f="addr" data-i="${i}" placeholder="주소 또는 장소 검색" value="${esc(s.addr)}" autocomplete="off" data-autocomplete-id="site-${i}">
            <div class="nominatim-dd hidden" id="site-dd-${i}"></div>
          </div>
        </div>
        <div class="field">
          <label class="lbl">별칭 (선택)</label>
          <input type="text" data-f="alias" data-i="${i}" placeholder="예: ○○아파트 정문 앞" value="${esc(s.alias)}">
        </div>
        <div class="field" style="margin-bottom:0">
          <label class="lbl">사전 메모</label>
          <input type="text" data-f="memo" data-i="${i}" placeholder="예: 민원 3회 접수" value="${esc(s.memo)}">
        </div>`;
      wrap.appendChild(row);
      setupAutocomplete(row.querySelector(`[data-f="addr"]`), row.querySelector(`#site-dd-${i}`), item=>{
        sites[i].addr=item.name; sites[i].lat=item.lat; sites[i].lng=item.lng;
        row.querySelector(`[data-f="addr"]`).value=item.name;
        row.querySelector(`[data-f="addr"]`).dispatchEvent(new Event("change"));
      });
    });
  }

  function renderCustomCl(){
    const list=$("#custom-cl-list"); list.innerHTML="";
    customCl.forEach((v,i)=>{
      const div=document.createElement("div"); div.className="cl-item";
      div.innerHTML=`<input type="text" data-ci="${i}" placeholder="점검 항목 ${i+1}" value="${esc(v)}">
        <button class="icon-del" type="button" data-clact="del" data-ci="${i}">🗑</button>`;
      list.appendChild(div);
    });
  }

  $("#site-list").addEventListener("input",e=>{
    const f=e.target.dataset.f, i=e.target.dataset.i;
    if(f!=null&&i!=null){ sites[+i][f]=e.target.value; if(f==="addr"){sites[+i].lat=null;sites[+i].lng=null;} }
  });
  $("#site-list").addEventListener("click",e=>{
    const b=e.target.closest("button"); if(!b) return;
    if(b.dataset.act==="del"){sites.splice(+b.dataset.i,1);if(!sites.length)sites.push(blankSite());renderSites();}
  });
  $("#add-site").addEventListener("click",()=>{sites.push(blankSite());renderSites();window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});});
  $("#f-type").addEventListener("change",e=>{
    const type=e.target.value;
    e.target.classList.remove("unset");
    const tpl=checklistTemplates[type];
    if(tpl){ customCl=tpl.slice(); }
    else { customCl=[""]; }
    $("#custom-cl-wrap").classList.remove("hidden");
    renderCustomCl();
  });
  $("#custom-cl-list").addEventListener("input",e=>{if(e.target.dataset.ci!=null)customCl[+e.target.dataset.ci]=e.target.value;});
  $("#custom-cl-list").addEventListener("click",e=>{
    const b=e.target.closest("button"); if(b&&b.dataset.clact==="del"){customCl.splice(+b.dataset.ci,1);if(!customCl.length)customCl.push("");renderCustomCl();}
  });
  $("#add-cl-item").addEventListener("click",()=>{customCl.push("");renderCustomCl();});

  /* ── 생성 ── */
  $("#generate").addEventListener("click",()=>{
    const date=$("#f-date").value, type=$("#f-type").value;
    if(!type){toast("점검 유형을 먼저 선택해 주세요");return;}
    const cleanSites=sites.filter(s=>s.addr.trim()).map(s=>({
      addr:s.addr.trim(), alias:s.alias.trim(), memo:s.memo.trim(),
      lat:s.lat, lng:s.lng
    }));
    if(!cleanSites.length){toast("주소가 입력된 점검지를 1개 이상 추가하세요");return;}
    const cl=customCl.map(x=>x.trim()).filter(Boolean);
    if(!cl.length){toast("점검 항목을 1개 이상 입력하세요");return;}
    const data={date,type,sites:cleanSites,customChecklist:cl};
    const url=location.origin+location.pathname+"?data="+b64enc(data);
    history.pushState(null,"",url);
    toast("✅ 점검표가 생성되었습니다");
    renderStep2(data);
  });

  /* ── STEP 2 ── */
  let DATA=null, progressKey="", progress={}, cur=0;
  let celebShown=false;
  function checklistFor(data){ return data.customChecklist||checklistTemplates[data.type]||[]; }
  function siteProgress(i){ if(!progress[i]) progress[i]={checks:[],result:null}; return progress[i]; }
  function saveProgress(){
    try{ localStorage.setItem(progressKey,JSON.stringify(progress)); }catch(e){}
    sb.from('inspection_progress').upsert({
      hash_key:progressKey, progress_json:progress,
      updated_at:new Date().toISOString()
    }).catch(()=>{});
  }

  async function syncFromSupabase(){
    try{
      const {data:row,error}=await sb.from('inspection_progress')
        .select('progress_json').eq('hash_key',progressKey).maybeSingle();
      if(!error&&row?.progress_json){
        progress=row.progress_json;
        try{ localStorage.setItem(progressKey,JSON.stringify(progress)); }catch(e){}
        updateSummary(); renderCard();
      }
    }catch(e){}
  }
  function doneCount(){ return Object.values(progress).filter(p=>p&&p.result).length; }
  function updateSummary(){
    const total=DATA.sites.length, done=doneCount();
    $("#s-done").textContent=done; $("#s-count").textContent=total;
    $("#s-fill").style.width=(total?Math.round(done/total*100):0)+"%";
  }

  function mapButtons(addr, lat, lng){
    const q=encodeURIComponent(addr);
    if(lat&&lng){
      const nameEnc=encodeURIComponent(addr||"목적지");
      return `<div class="map-row no-print">
        <a class="btn kakao" href="https://map.kakao.com/link/to/${nameEnc},${lat},${lng}" target="_blank" rel="noopener">🗺️ 카카오맵</a>
        <a class="btn naver" href="https://map.naver.com/p/search/${q}" target="_blank" rel="noopener">🗺️ 네이버지도</a>
      </div>`;
    }
    return `<div class="map-row no-print">
      <a class="btn kakao" href="https://map.kakao.com/?q=${q}" target="_blank" rel="noopener">🗺️ 카카오맵</a>
      <a class="btn naver" href="https://map.naver.com/p/search/${q}" target="_blank" rel="noopener">🗺️ 네이버지도</a>
    </div>`;
  }

  function cardHTML(i){
    const s=DATA.sites[i], p=siteProgress(i), items=checklistFor(DATA);
    const rcls=p.result?"r-"+p.result:"";
    const checks=items.map((it,k)=>{
      const on=p.checks&&p.checks[k];
      return `<label class="check-item ${on?'checked':''}"><input type="checkbox" data-chk="${k}" ${on?'checked':''}><span>${esc(it)}</span></label>`;
    }).join("");
    return `<div class="insp-card ${rcls}" data-card="${i}">
      <div class="ic-head">
        <span class="ic-seq">${i+1}</span>
        <span class="ic-alias">${esc(s.alias||s.addr||'(이름 없음)')}</span>
      </div>
      <div class="ic-addr">📍 ${esc(s.addr)}</div>
      ${s.memo?`<div class="prememo">${esc(s.memo)}</div>`:""}
      ${mapButtons(s.addr,s.lat,s.lng)}
      <div class="checklist">
        <h3>✔ 점검 항목</h3>
        ${checks||'<div class="hint">점검 항목이 없습니다.</div>'}
      </div>
      <div class="result-row no-print">
        <button type="button" data-r="done"    class="${p.result==='done'?'on':''}"><span class="em">✅</span>완료</button>
        <button type="button" data-r="issue"   class="${p.result==='issue'?'on':''}"><span class="em">⚠️</span>이상 발견</button>
        <button type="button" data-r="revisit" class="${p.result==='revisit'?'on':''}"><span class="em">🔄</span>재방문</button>
      </div>
    </div>`;
  }

  function renderCard(){
    const mount=$("#card-mount"); mount.innerHTML=cardHTML(cur);
    $("#prev-btn").disabled=cur===0;
    $("#next-btn").disabled=cur===DATA.sites.length-1;
    $("#next-btn").textContent=cur===DATA.sites.length-1?"마지막":"다음 ▶";
    const card=mount.querySelector(".insp-card");
    card.querySelectorAll("[data-chk]").forEach(cb=>{
      cb.addEventListener("change",()=>{
        const p=siteProgress(cur); if(!p.checks) p.checks=[];
        p.checks[+cb.dataset.chk]=cb.checked;
        cb.closest(".check-item").classList.toggle("checked",cb.checked);
        saveProgress();
      });
    });
    card.querySelectorAll("[data-r]").forEach(btn=>{
      btn.addEventListener("click",()=>{
        const p=siteProgress(cur);
        p.result=p.result===btn.dataset.r?null:btn.dataset.r;
        card.querySelectorAll("[data-r]").forEach(b=>b.classList.toggle("on",b.dataset.r===p.result));
        card.className="insp-card "+(p.result?"r-"+p.result:"");
        saveProgress(); updateSummary();
        if(!celebShown&&p.result&&doneCount()===DATA.sites.length){
          setTimeout(()=>showCelebration(),300);
        }
      });
    });
    window.scrollTo({top:0,behavior:"smooth"});
  }

  function launchConfetti(){
    const canvas=$("#confetti-canvas");
    const ctx=canvas.getContext("2d");
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
    const colors=["#8247ff","#f47bff","#ffeb3b","#4caf50","#ff5722","#2196f3","#ff4081"];
    const particles=Array.from({length:130},()=>({
      x:Math.random()*canvas.width, y:-20,
      r:Math.random()*7+3,
      color:colors[Math.floor(Math.random()*colors.length)],
      vx:(Math.random()-0.5)*4, vy:Math.random()*5+3,
      rot:Math.random()*360, vrot:(Math.random()-0.5)*10,
      shape:Math.random()>.5?"circle":"rect"
    }));
    let raf, start=null;
    function draw(ts){
      if(!start) start=ts;
      ctx.clearRect(0,0,canvas.width,canvas.height);
      particles.forEach(p=>{
        p.x+=p.vx; p.y+=p.vy; p.rot+=p.vrot; p.vy+=0.12;
        if(p.y>canvas.height+20) return;
        ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
        ctx.globalAlpha=Math.max(0,1-(ts-start)/3500);
        ctx.fillStyle=p.color;
        if(p.shape==="circle"){ ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.fill(); }
        else{ ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r); }
        ctx.restore();
      });
      if(ts-start<3500) raf=requestAnimationFrame(draw);
      else ctx.clearRect(0,0,canvas.width,canvas.height);
    }
    raf=requestAnimationFrame(draw);
    return ()=>{ cancelAnimationFrame(raf); ctx.clearRect(0,0,canvas.width,canvas.height); };
  }

  function showCelebration(){
    const issue=DATA.sites.filter((_,i)=>progress[i]?.result==="issue").length;
    const total=DATA.sites.length;
    $("#celeb-emoji").textContent=issue>0?"✅":"🎉";
    $("#celeb-sub").textContent=issue>0?`총 ${total}곳 · 이상 발견 ${issue}곳`:`${total}곳 전체 이상 없음 🙌`;
    $("#celeb-overlay").classList.remove("hidden");
    celebShown=true;
    const stop=launchConfetti();
    $("#celeb-close").onclick=()=>{ stop(); $("#celeb-overlay").classList.add("hidden"); };
  }

function renderStep2(data){
    DATA=data; cur=0; celebShown=false;
    progressKey=hashKey(data);
    try{ progress=JSON.parse(localStorage.getItem(progressKey))||{}; }catch(e){ progress={}; }
    $("#s-date").textContent=data.date||"-";
    $("#s-type").textContent=data.type||"-";
    $("#s-total").textContent=data.sites.length;
    $("#step1").classList.add("hidden");
    $("#step2").classList.remove("hidden");
    $("#nav-bar").classList.remove("hidden");
    updateSummary(); renderCard();
    syncFromSupabase();
  }

  /* ── 스와이프 ── */
  (function(){
    let x0=null,y0=null;
    const m=$("#card-mount");
    m.addEventListener("touchstart",e=>{x0=e.touches[0].clientX;y0=e.touches[0].clientY;},{passive:true});
    m.addEventListener("touchend",e=>{
      if(x0==null) return;
      const dx=e.changedTouches[0].clientX-x0, dy=e.changedTouches[0].clientY-y0;
      if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){
        if(dx<0&&cur<DATA.sites.length-1){cur++;renderCard();}
        else if(dx>0&&cur>0){cur--;renderCard();}
      }
      x0=y0=null;
    },{passive:true});
  })();

  $("#prev-btn").addEventListener("click",()=>{ if(cur>0){cur--;renderCard();} });
  $("#next-btn").addEventListener("click",()=>{ if(cur<DATA.sites.length-1){cur++;renderCard();} });
  $("#share-btn").addEventListener("click",()=>copy(location.href).then(ok=>toast(ok?"📤 공유 링크 복사됨":"복사 실패")));
  $("#edit-btn").addEventListener("click",()=>{
    history.pushState(null,"",location.origin+location.pathname);
    fillStep1(DATA);
    $("#step2").classList.add("hidden"); $("#nav-bar").classList.add("hidden");
    $("#step1").classList.remove("hidden"); window.scrollTo(0,0);
  });

  /* ── STEP 1 복원 ── */
  function fillStep1(data){
    $("#f-date").value=(data&&data.date)||new Date().toISOString().slice(0,10);
    const ftype=$("#f-type");
    ftype.value=(data&&data.type)||"";
    if(!ftype.value){ ftype.classList.add("unset"); $("#custom-cl-wrap").classList.add("hidden"); }
    else {
      ftype.classList.remove("unset");
      customCl=(data&&data.customChecklist?.length)
        ?data.customChecklist.slice()
        :(checklistTemplates[data.type]?.slice()||[""]);
      $("#custom-cl-wrap").classList.remove("hidden");
      renderCustomCl();
    }
    sites=(data&&data.sites?.length)
      ?data.sites.map(s=>({addr:s.addr||"",alias:s.alias||"",memo:s.memo||"",lat:s.lat||null,lng:s.lng||null}))
      :[blankSite()];
    renderSites();
  }

  /* ── 초기화 ── */
  function init(){
    const enc=new URLSearchParams(location.search).get("data");
    if(enc){
      const data=b64dec(enc);
      if(data&&data.sites){ fillStep1(data); renderStep2(data); return; }
      toast("공유 링크를 읽을 수 없습니다");
    }
    fillStep1(null);
  }
  window.addEventListener("popstate",()=>location.reload());
  init();
})();
</script>
</body>
</html>
